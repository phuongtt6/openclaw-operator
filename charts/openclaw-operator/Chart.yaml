apiVersion: v2
name: openclaw-operator
description: >-
  A Kubernetes operator for deploying and managing OpenClaw AI assistant
  instances
type: application
version: 0.36.4
appVersion: 0.36.4
keywords:
  - kubernetes
  - operator
  - openclaw
  - ai
  - assistant
  - llm
  - automation
  - agent
home: https://paperclip.inc
icon: https://paperclip.inc/favicon.svg
sources:
  - https://github.com/paperclipinc/openclaw-operator
maintainers:
  - name: Jannes Stubbemann
    email: jannes@paperclip.inc
    url: https://github.com/stubbi
kubeVersion: '>=1.28.0-0'
annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: 'true'
  artifacthub.io/operatorCapabilities: Auto Pilot
  artifacthub.io/prerelease: 'false'
  artifacthub.io/links: |
    - name: Website
      url: https://paperclip.inc
    - name: Documentation
      url: https://paperclip.inc/docs/operators/openclaw
    - name: OperatorHub
      url: https://operatorhub.io/operator/openclaw-operator
    - name: Artifact Hub
      url: https://artifacthub.io/packages/olm/community-operators/openclaw-operator
    - name: support
      url: https://github.com/paperclipinc/openclaw-operator/issues
  artifacthub.io/crds: |
    - kind: OpenClawInstance
      version: v1alpha1
      name: openclawinstances.openclaw.rocks
      displayName: OpenClaw Instance
      description: Represents a managed OpenClaw AI agent instance
    - kind: OpenClawSelfConfig
      version: v1alpha1
      name: openclawselfconfigs.openclaw.rocks
      displayName: OpenClaw Self-Config
      description: A request from an agent to modify its own OpenClawInstance spec
    - kind: OpenClawClusterDefaults
      version: v1alpha1
      name: openclawclusterdefaults.openclaw.rocks
      displayName: OpenClaw Cluster Defaults
      description: Cluster-scoped defaults merged into every OpenClawInstance at reconcile time
  artifacthub.io/crdsExamples: |
    - apiVersion: openclaw.rocks/v1alpha1
      kind: OpenClawInstance
      metadata:
        name: my-openclaw
      spec:
        envFrom:
          - secretRef:
              name: openclaw-api-keys
        storage:
          persistence:
            enabled: true
            size: 10Gi
  artifacthub.io/images: |
    - name: openclaw-operator
      image: ghcr.io/paperclipinc/openclaw-operator:v0.36.4 # x-release-please-version
  artifacthub.io/changes: |
    - kind: added
      description: Helm chart OCI artifact is now cosign-signed (keyless)
    - kind: fixed
      description: artifacthub.io/images annotation now tracks the released operator image tag
