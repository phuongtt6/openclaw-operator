apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: conformance-observability
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: v1.0.0
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
  storage:
    persistence:
      enabled: true
      size: 1Gi
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      grafanaDashboard:
        enabled: true
