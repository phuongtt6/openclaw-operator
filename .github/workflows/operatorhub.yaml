name: OperatorHub Submission

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.6.0)'
        required: true

jobs:
  submit:
    name: Submit to OperatorHub
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: version
        run: |
          # workflow_dispatch passes tag as input; release event uses GITHUB_REF
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Prepare bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BUNDLE_DIR="submission/operators/openclaw-operator/${VERSION}"

          # Resolve the published image to an immutable digest reference so the
          # submitted bundle is pinned (OLM best practice). Fall back to the
          # floating tag if the digest cannot be resolved (e.g. registry hiccup).
          IMG="ghcr.io/paperclipinc/openclaw-operator"
          DIGEST="$(docker buildx imagetools inspect "${IMG}:${TAG}" --format '{{ .Manifest.Digest }}' 2>/dev/null || true)"
          if [ -n "${DIGEST}" ]; then IMG_REF="${IMG}@${DIGEST}"; else IMG_REF="${IMG}:${TAG}"; fi
          echo "Pinning image to: ${IMG_REF}"

          mkdir -p "${BUNDLE_DIR}/manifests" "${BUNDLE_DIR}/metadata"

          # Copy and version the CSV. The operator image is rewritten to the
          # pinned IMG_REF in both spec.install (deployment) and spec.relatedImages.
          sed \
            -e "s/openclaw-operator\.v[0-9]\+\.[0-9]\+\.[0-9]\+/openclaw-operator.v${VERSION}/g" \
            -e "s|ghcr.io/paperclipinc/openclaw-operator:v[0-9]\+\.[0-9]\+\.[0-9]\+|${IMG_REF}|g" \
            -e "s/createdAt: .*/createdAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"/" \
            -e "s/^  version: [0-9]\+\.[0-9]\+\.[0-9]\+/  version: ${VERSION}/" \
            bundle/manifests/openclaw-operator.v*.clusterserviceversion.yaml \
            > "${BUNDLE_DIR}/manifests/openclaw-operator.v${VERSION}.clusterserviceversion.yaml"

          # Copy CRDs and metadata as-is (all owned CRDs, not just one)
          cp bundle/manifests/openclaw.rocks_*.yaml "${BUNDLE_DIR}/manifests/"
          cp bundle/metadata/annotations.yaml "${BUNDLE_DIR}/metadata/"

          echo "Bundle prepared at ${BUNDLE_DIR}:"
          find "${BUNDLE_DIR}" -type f

      - name: Fork and submit to community-operators
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_FORK_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="openclaw-operator-v${VERSION}"

          # Configure gh as git credential helper so git push works with the PAT
          gh auth setup-git

          # Clone the community-operators repo (fork is auto-created by gh)
          gh repo fork k8s-operatorhub/community-operators --clone -- community-operators
          cd community-operators

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FORK_OWNER=$(gh api user --jq '.login')

          # Sync the fork's main with upstream SERVER-SIDE. gh repo sync performs a
          # fast-forward via the GitHub API and is exempt from the PAT 'workflow'
          # scope restriction. Previously we reset --hard to upstream/main and pushed
          # the branch, which carried upstream's .github/workflows changes; a PAT
          # without 'workflow' scope is refused that push (broke v0.36.1/v0.36.2).
          gh repo sync "${FORK_OWNER}/community-operators" --branch main --force

          # Branch from the now-synced fork main, so the bundle branch's push delta
          # is ONLY the bundle commit (workflow-file commits are already on the fork
          # via the server-side sync and are not re-introduced by the push).
          git fetch origin main
          git checkout -B "${BRANCH}" origin/main

          # Copy prepared bundle (mkdir for first-time submissions)
          mkdir -p operators/openclaw-operator
          cp -r ../submission/operators/openclaw-operator/${VERSION} operators/openclaw-operator/${VERSION}
          # Seed ci.yaml only when the catalog does not already have one. Overwriting
          # it on every release is a privileged change that withholds the
          # authorized-changes label and blocks auto-merge.
          [ -f operators/openclaw-operator/ci.yaml ] || cp "${GITHUB_WORKSPACE}/bundle/ci.yaml" operators/openclaw-operator/ci.yaml

          git add "operators/openclaw-operator/${VERSION}" operators/openclaw-operator/ci.yaml
          git commit -m "operator openclaw-operator (${VERSION})"
          git push --force origin "${BRANCH}"

          # --head requires owner:branch for cross-fork PRs
          FORK_OWNER=$(gh api user --jq '.login')

          # Create PR or update existing one (re-runs push new content via --force above)
          if ! gh pr view "${FORK_OWNER}:${BRANCH}" --repo k8s-operatorhub/community-operators --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            gh pr create \
              --repo k8s-operatorhub/community-operators \
              --head "${FORK_OWNER}:${BRANCH}" \
              --title "operator openclaw-operator (${VERSION})" \
              --body "$(cat <<EOF
          ### Update to openclaw-operator

          **Version:** ${VERSION}
          **Operator:** [OpenClaw Kubernetes Operator](https://github.com/paperclipinc/openclaw-operator)

          #### Changes
          See [release notes](https://github.com/paperclipinc/openclaw-operator/releases/tag/v${VERSION}).

          #### Testing
          - CI tests pass on the source repository
          - Container image is published and signed at \`ghcr.io/paperclipinc/openclaw-operator:v${VERSION}\`
          EOF
          )"
          else
            echo "PR already exists for ${FORK_OWNER}:${BRANCH} - branch was force-pushed with updated content"
          fi

  submit-redhat:
    name: Submit to redhat-openshift-ecosystem/community-operators-prod
